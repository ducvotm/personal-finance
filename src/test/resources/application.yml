spring:
  application:
    name: budget-mvp-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: TestSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForTesting
  access-expiration: 86400000
  refresh-expiration: 604800000
  role-default: "USER"

logging:
  level:
    root: WARN
    com.example.finance: INFO
