server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: budget-mvp

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/personal_finance?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:Admin@123}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:PersonalFinanceSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024}
  access-expiration: ${JWT_ACCESS_EXPIRATION:14400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  role-default: ${JWT_ROLE_DEFAULT:USER}

ai:
  provider: ${AI_PROVIDER:ollama}
  base-url: ${AI_BASE_URL:http://localhost:11434}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:llama3.2}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:20}
  max-excerpt-chars: ${AI_MAX_EXCERPT_CHARS:220}
  max-quotes-per-response: ${AI_MAX_QUOTES_PER_RESPONSE:1}
  min-retrieval-score: ${AI_MIN_RETRIEVAL_SCORE:0.12}
  book:
    source-path: ${AI_BOOK_SOURCE_PATH:}
    source-title: ${AI_BOOK_SOURCE_TITLE:The Psychology of Money}
    top-k: ${AI_BOOK_TOP_K:3}
    chunk-size: ${AI_BOOK_CHUNK_SIZE:800}
    chunk-overlap: ${AI_BOOK_CHUNK_OVERLAP:120}
    embedding-dimensions: ${AI_BOOK_EMBEDDING_DIMS:256}
  wiki:
    root-path: ${AI_WIKI_ROOT_PATH:knowledge}
    raw-dir: ${AI_WIKI_RAW_DIR:raw}
    wiki-dir: ${AI_WIKI_DIR:wiki}
    logs-dir: ${AI_WIKI_LOGS_DIR:logs}
    max-query-pages: ${AI_WIKI_MAX_QUERY_PAGES:5}
    stale-after-days: ${AI_WIKI_STALE_AFTER_DAYS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.example.finance: DEBUG
    com.example.finance.security: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
