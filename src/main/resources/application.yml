server:
  port: 8080

spring:
  application:
    name: personal-finance

  datasource:
    url: jdbc:mysql://localhost:3306/personal_finance?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Admin@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

jwt:
  secret: PersonalFinanceSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024
  access-expiration: 14400000
  refresh-expiration: 604800000
  role-default: "USER"

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: spring-boot
  prometheus:
    metrics:
      export:
        enabled: true

sentry:
  dsn: ${SENTRY_DSN:}

logging:
  level:
    com.example.finance: DEBUG
    com.example.finance.security: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
