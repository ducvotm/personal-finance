global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'Spring Boot Application'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['personal-finance:8080']
        labels:
          application: 'personal-finance'
          environment: 'docker'

  - job_name: 'Prometheus'
    static_configs:
      - targets: ['localhost:9090']
