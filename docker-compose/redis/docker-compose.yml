services:
  redis:
    image: redis:7.2.1-alpine3.18
    container_name: redis
    environment:
      REDIS_PASSWORD: Redis@123
    ports:
      - "6379:6379"
    restart: on-failure
    command: redis-server --requirepass ${REDIS_PASSWORD:-Redis@123}
    networks:
      - finance-network

networks:
  finance-network:
    name: finance-network
    external: true
