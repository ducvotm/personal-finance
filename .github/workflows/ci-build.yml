name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0.33
        env:
          MYSQL_ROOT_PASSWORD: Admin@123
          MYSQL_DATABASE: personal_finance
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:7.2.1-alpine3.18
        env:
          REDIS_PASSWORD: Redis@123
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build and Test with Maven
        env:
          SPRING_DATASOURCE_URL: 'jdbc:mysql://127.0.0.1:3306/personal_finance'
          SPRING_DATASOURCE_USERNAME: 'root'
          SPRING_DATASOURCE_PASSWORD: 'Admin@123'
          SPRING_JPA_HIBERNATE_DDLAUTO: 'update'
          SPRING_DATA_REDIS_HOST: '127.0.0.1'
          SPRING_DATA_REDIS_PORT: '6379'
          SPRING_DATA_REDIS_PASSWORD: 'Redis@123'
        run: chmod +x mvnw && ./mvnw -B package --file pom.xml
